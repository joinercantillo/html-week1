<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Pet Store</h1>
    <h2>Lista de Mascotas</h2>
    
    <section class="link">
        <p>Ir a mascotas</p>
        <a href="mascotas.html"><img src="200w.gif" alt="Icono de mascota"></a>
    </section>
    
    <section>
        <h2>Sobre Nosotros</h2>
        <p>Somos una tienda de mascotas desde el 2010.</p> 
    </section>
    
    <section class="projects">
        <h2>PROYECTOS</h2>
        <ul>
            <li><a href="#">YOUTUBE</a></li>
            <li><a href="#">INSTAGRAM</a></li>
            <li><a href="#">FACEBOOK</a></li>
            <li><a href="#">TWITTER</a></li>
        </ul>
    </section>
    
    <section class="contact">
        <form action="">
            <h2>Contáctanos</h2>
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" id="name" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="num">Número de teléfono:</label>
                <input type="text" id="num" placeholder="Tu teléfono">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Tu correo">
            </div>
            <div class="form-group">
                <label for="observacion">Observación:</label>
                <textarea id="observacion" rows="4"></textarea>
            </div>
            <button type="submit">Enviar</button>
        </form>
    </section>
    
    <section class="link">
        <a href="portafolio.html">Ir al PORTAFOLIO</a>
    </section>
</body>
</html>
