<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Store</title>
    <link rel="stylesheet" href="styles.css">
    <!-- TASK 1: Retomar el proyecto - Enlazar CSS -->
</head>

<body>
    <header>
        <h1>Pet Store</h1>
        <h2>Pet List</h2>
        <!-- TASK 1: Retomar el proyecto - Encabezado de la página de tienda -->
    </header>

    <main>
        <section class="link">
            <p>Go to pets</p>
            <a href="mascotas.html"><img src="200w.gif" alt="Pet icon"></a>
            <!-- TASK 1: Retomar el proyecto - Enlace a la página de mascotas -->
        </section>

        <section class="about">
            <h2>About Us</h2>
            <p>We are a pet store since 2010.</p>
            <!-- TASK 1: Retomar el proyecto - Sección sobre la tienda -->
        </section>

        <section class="contact">
            <form action="">
                <h2>Contact Us</h2>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label for="num">Phone number:</label>
                    <input type="tel" id="num" placeholder="Your phone" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Your email" required>
                </div>
                <div class="form-group">
                    <label for="observation">Observations</label>
                    <textarea id="observation" rows="4" placeholder="Write your observations"></textarea>
                </div>
                <button type="submit" class="boton1">Submit</button>
            </form>
            <!-- TASK 1: Retomar el proyecto - Formulario de contacto -->
        </section>

        <section class="link">
            <a href="index.html" class="boton1">Back to portfolio</a>
            <!-- TASK 1: Retomar el proyecto - Enlace para volver al portafolio -->
        </section>
    </main>
</body>
</html>
